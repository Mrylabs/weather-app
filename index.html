<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>weather app</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  
<div id="loader" class="loader hidden">
  <div class="spinner"></div>
  <p>Fetching weather data...</p>
</div>

<header class="header">
  <div class="header-left">
    <div class="favorite-dropdown">
      <button class="favorite-toggle-btn">⭐ Favorites ▼</button>
      <ul class="favorite-dropdown-list hidden"></ul>
    </div>
  </div>

  <h1>Mry's Weather App</h1>

  <div class="header-right">
    <button class="unit-toggle">°C / °F</button>
  </div>
</header>

<section class="search-section">
  <div class="search-bar">
    <button class="get-location-btn" title="Use my location">
      <img src="./assets/location.svg" class="location-icon" alt="Location icon">
    </button>

    <input
      type="text"
      class="search-input"
      placeholder="Enter city..." />

    <button class="favorite-btn" title="Add to favorites">☆</button>
  </div>

  <button class="search-btn">Search</button>
</section>

<section class="weather-info">
  <p class="error-message"></p>
</section>

<!-- 🌤 WEATHER DASHBOARD -->
<div class="weather-details">
  <div class="weather-dashboard">

    <div class="top-row">
      <!-- MAIN WEATHER -->
      <div class="card-main">
        <div class="weather-main">
          <div class="weather-left">
            <span id="weather-icon"></span>

            <div class="weather-text">
              <h2 id="city-title" class="city-title"></h2>
              <p id="description">—</p>
            </div>
          </div>

          <div class="weather-right">
            <p id="temperature" class="temperature-text"></p>
          </div>
        </div>
      </div>

      <!-- STATS -->
      <div class="weather-right-column">
        <div class="card-small" id="feels-like">
          <span class="label">Feels like</span>
          <span class="value">Unavailable</span>
        </div>

        <div class="card-small" id="uv-index">
          <span class="label">UV Index</span>
          <span class="value">Unavailable</span>
        </div>

        <div class="card-small" id="air-quality">
          <span class="label">Air Quality</span>
          <span class="value">Unavailable</span>
        </div>

        <div class="card-small" id="wind">
          <span class="label">Wind</span>
          <span class="value">Unavailable</span>
        </div>

        <div class="card-small" id="humidity">
          <span class="label">Humidity</span>
          <span class="value">Unavailable</span>
        </div>
      </div>
    </div>

    <!-- FORECAST FULL WIDTH -->
    <div class="card-forecast forecast-full">
      <canvas id="forecastChart"></canvas>
    </div>

  </div>
</div>

<div id="weather-particles"></div>
<div id="cloud-layer"></div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
